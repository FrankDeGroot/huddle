@if (open) {
  <div class="modal" (click)="close()">
    <div class="modal-box" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Start devcontainer</h2>
        <button class="modal-close" (click)="close()">✕</button>
      </div>
      <div class="modal-body">
        <label for="start-ide">IDE</label>
        <select id="start-ide" [(ngModel)]="ide" (ngModelChange)="onIdeChange()">
          <option value="intellij">IntelliJ IDEA</option>
          <option value="rider">Rider</option>
          <option value="vscode">VS Code</option>
        </select>

        <label for="start-image">Image</label>
        <select id="start-image" [(ngModel)]="selectedImage">
          @if (baseImage) {
            <option [value]="baseImage">[Default] {{ baseImage }}</option>
          }
          @for (img of images; track img.id) {
            @if (img.name !== baseImage && img.name !== baseImage + ':latest') {
              <option [value]="img.name">[Snapshot] {{ img.name }} ({{ img.size | fmtBytes }})</option>
            }
          }
          @if (!baseImage && images.length === 0) {
            <option value="">No images available for this IDE</option>
          }
        </select>

        <label class="empty-toggle">
          <input type="checkbox" [(ngModel)]="empty" (ngModelChange)="onEmptyToggle()" />
          Empty (clone manually)
        </label>

        <label for="start-workspace">Workspace directory</label>
        <input id="start-workspace" type="text" [(ngModel)]="workspace" (ngModelChange)="onWorkspaceInput()" placeholder="C:/projects/my-project" [disabled]="empty" />

        <label for="start-name">Container name</label>
        <input id="start-name" type="text" [(ngModel)]="containerName" (input)="nameTouched = true" placeholder="devcontainer-my-project" />

        @if (error) { <p class="form-error">{{ error }}</p> }
        @if (status) { <p class="form-status">{{ status }}</p> }
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" [disabled]="loading" (click)="confirm()">Start</button>
        <button class="btn btn-ghost" (click)="close()">Cancel</button>
      </div>
    </div>
  </div>
}
