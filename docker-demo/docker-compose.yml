services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: penguins
      POSTGRES_USER: penguins
      POSTGRES_PASSWORD: penguins
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penguins -d penguins"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/penguins
      SPRING_DATASOURCE_USERNAME: penguins
      SPRING_DATASOURCE_PASSWORD: penguins
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:

networks:
  demo-network:
