name: Publish experiment

# Experimentele builds: elke push naar een experiment/<issuenummer>-... branch
# publiceert een volledige Huddle-release (CLI + alle Docker images) onder de
# tag experiment-<issuenummer>, volledig gescheiden van de normale releaseflow.
on:
  push:
    branches: [experiment/**]

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      issue: ${{ steps.parse.outputs.issue }}
      tag: ${{ steps.parse.outputs.tag }}
      sha-tag: ${{ steps.parse.outputs.sha_tag }}
    steps:
      - name: Issue-nummer uit branchnaam lezen
        id: parse
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          ISSUE=$(echo "$BRANCH" | sed -nE 's#^experiment/([0-9]+).*#\1#p')
          if [ -z "$ISSUE" ]; then
            echo "::error::Branchnaam '$BRANCH' bevat geen issue-nummer. Verwacht: experiment/<issuenummer>-<omschrijving>"
            exit 1
          fi
          # Leading zeros strippen zodat de tag overeenkomt met wat de CLI
          # uit het issue-nummer afleidt (experiment/007-... -> experiment-7).
          ISSUE=$((10#$ISSUE))
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          {
            echo "issue=$ISSUE"
            echo "tag=experiment-$ISSUE"
            echo "sha_tag=experiment-$ISSUE-$SHORT_SHA"
          } >> "$GITHUB_OUTPUT"
          echo "Experiment-tag: experiment-$ISSUE (issue #$ISSUE, commit $SHORT_SHA)"

  docker:
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/infosupport/huddle:${{ needs.meta.outputs.tag }}
            ghcr.io/infosupport/huddle:${{ needs.meta.outputs.sha-tag }}

  base-images:
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base-devimage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: base-devimage/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/infosupport/base-devimage:${{ needs.meta.outputs.tag }}
            ghcr.io/infosupport/base-devimage:${{ needs.meta.outputs.sha-tag }}

      - name: Build and push base-devimage-vscode
        uses: docker/build-push-action@v6
        with:
          context: .
          file: base-devimage-vscode/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/infosupport/base-devimage-vscode:${{ needs.meta.outputs.tag }}
            ghcr.io/infosupport/base-devimage-vscode:${{ needs.meta.outputs.sha-tag }}

      - name: Build and push base-devimage-intellij
        uses: docker/build-push-action@v6
        with:
          context: .
          file: base-devimage-intellij/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/infosupport/base-devimage-intellij:${{ needs.meta.outputs.tag }}
            ghcr.io/infosupport/base-devimage-intellij:${{ needs.meta.outputs.sha-tag }}

      - name: Build and push base-devimage-rider
        uses: docker/build-push-action@v6
        with:
          context: .
          file: base-devimage-rider/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/infosupport/base-devimage-rider:${{ needs.meta.outputs.tag }}
            ghcr.io/infosupport/base-devimage-rider:${{ needs.meta.outputs.sha-tag }}

  # De npm-publish van de experimentele CLI leeft in publish-npm.yml: npm
  # trusted publishing staat maar één trusted publisher (workflow-bestand)
  # per package toe.
