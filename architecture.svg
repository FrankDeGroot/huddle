<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 600" role="img" aria-label="Architectuur van de Huddle DMZ-devcontainer met firewall, proxy en Docker-socket" style="width:100%;height:auto;font-family:'Inter',system-ui,sans-serif;">
            <defs>
              <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
              <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#059669"/></marker>
            </defs>

            <!-- ============ NETWERK-KADER: intern netwerk (dc-net) ============ -->
            <!-- Rechterrand loopt op x=574 door de Huddle-box: Huddle zit er links in en gaat er rechts uit (internet). -->
            <rect x="10" y="30" width="564" height="556" rx="18" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="11 7"/>
            <text x="318" y="49" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">🔒 Intern Docker-netwerk · dc-net-&lt;naam&gt;</text>
            <rect x="22" y="36" width="150" height="22" rx="11" fill="#fee2e2" stroke="#ef4444"/>
            <text x="97" y="51" text-anchor="middle" font-size="10.5" font-weight="700" fill="#b91c1c">⛔ geen internet</text>
            <rect x="598" y="36" width="184" height="22" rx="11" fill="#dcfce7" stroke="#16a34a"/>
            <text x="690" y="51" text-anchor="middle" font-size="10.5" font-weight="700" fill="#15803d">🌐 Huddle = internet-uplink</text>

            <!-- ============ DEVCONTAINER (DMZ) ============ -->
            <rect x="24" y="64" width="300" height="500" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" stroke-dasharray="7 5"/>
            <text x="174" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">🐳 Devcontainer — DMZ</text>

            <rect x="44" y="104" width="260" height="64" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
            <text x="174" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Dev-tooling</text>
            <text x="174" y="150" text-anchor="middle" font-size="11" fill="#1e40af">IDE-backend · AI-CLI · git · npm · pip</text>

            <rect x="44" y="180" width="260" height="52" rx="8" fill="#e0e7ff" stroke="#818cf8"/>
            <text x="174" y="202" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">Proxy-omgeving</text>
            <text x="174" y="220" text-anchor="middle" font-size="10.5" font-family="monospace" fill="#4338ca">http_proxy=https_proxy=http://huddle:80</text>

            <rect x="44" y="244" width="260" height="130" rx="8" fill="#fef2f2" stroke="#f87171"/>
            <text x="174" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Egress-firewall · iptables</text>
            <text x="60" y="289" font-size="11" font-family="monospace" fill="#b91c1c">nat OUTPUT: DNAT tcp :80 → huddle</text>
            <text x="60" y="309" font-size="11" font-family="monospace" fill="#b91c1c">filter OUTPUT: ACCEPT lo</text>
            <text x="60" y="328" font-size="11" font-family="monospace" fill="#b91c1c">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;ACCEPT → huddle-IP</text>
            <text x="60" y="347" font-size="11" font-family="monospace" fill="#dc2626" font-weight="700">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;DROP &#8810; al het overige</text>
            <text x="174" y="367" text-anchor="middle" font-size="9.5" fill="#9f1239">geen DNS-omweg · geen directe IP's · geen tunnels</text>

            <rect x="44" y="388" width="260" height="54" rx="8" fill="#dcfce7" stroke="#34d399"/>
            <text x="174" y="410" text-anchor="middle" font-size="11.5" font-weight="700" font-family="monospace" fill="#065f46">/var/run/docker.sock</text>
            <text x="174" y="428" text-anchor="middle" font-size="10.5" fill="#047857">bind-mount, per container</text>

            <!-- ============ HUDDLE GATEWAY ============ -->
            <rect x="414" y="64" width="320" height="500" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
            <text x="574" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">🐧 Huddle Gateway</text>

            <rect x="434" y="104" width="280" height="78" rx="8" fill="#ffedd5" stroke="#fb923c"/>
            <text x="574" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">HTTP/HTTPS-proxy · :80</text>
            <text x="574" y="146" text-anchor="middle" font-size="11" fill="#c2410c">MITM-CA voor HTTP-inspectie</text>
            <text x="574" y="164" text-anchor="middle" font-size="11" fill="#c2410c">CONNECT-tunnel voor HTTPS</text>

            <rect x="434" y="194" width="280" height="72" rx="8" fill="#ffedd5" stroke="#fb923c"/>
            <text x="574" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Firewall rules-engine</text>
            <text x="574" y="236" text-anchor="middle" font-size="11" fill="#c2410c">allow → forward · deny → 403</text>
            <text x="574" y="254" text-anchor="middle" font-size="11" fill="#c2410c">request → 403 + regel aanmaken</text>

            <rect x="434" y="278" width="280" height="46" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
            <text x="574" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Audit-log — SQLite (WAL)</text>

            <rect x="434" y="336" width="280" height="86" rx="8" fill="#ffedd5" stroke="#fb923c"/>
            <text x="574" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Docker socket-proxy</text>
            <text x="574" y="378" text-anchor="middle" font-size="10.5" font-family="monospace" fill="#c2410c">/tmp/dc-sockets/&lt;naam&gt;.sock</text>
            <text x="574" y="396" text-anchor="middle" font-size="11" fill="#c2410c">time-boxed grant (1–120 min)</text>
            <text x="574" y="414" text-anchor="middle" font-size="11" fill="#c2410c">label-policy: huddle.parent</text>

            <rect x="434" y="434" width="280" height="80" rx="8" fill="#ffedd5" stroke="#fb923c"/>
            <text x="574" y="456" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9a3412">Management-API + Angular-UI · :3000</text>
            <text x="574" y="476" text-anchor="middle" font-size="11" fill="#c2410c">source-IP gate: alleen vanaf host</text>
            <text x="574" y="494" text-anchor="middle" font-size="11" fill="#c2410c">WebSocket live-push</text>

            <!-- ===== Grens loopt zichtbaar door Huddle (stubs boven/onder, tekstvrije zones) ===== -->
            <line x1="574" y1="64" x2="574" y2="84" stroke="#64748b" stroke-width="2.5" stroke-dasharray="11 7"/>
            <line x1="574" y1="516" x2="574" y2="569" stroke="#64748b" stroke-width="2.5" stroke-dasharray="11 7"/>
            <text x="574" y="581" text-anchor="middle" font-size="9.5" fill="#475569">⟵ binnen het netwerk · buiten = internet ⟶</text>

            <!-- ============ BUITENWERELD / HOST ============ -->
            <rect x="794" y="104" width="224" height="72" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
            <text x="906" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">🌐 Internet</text>
            <text x="906" y="154" text-anchor="middle" font-size="11" fill="#6d28d9">alleen allowlist-domeinen</text>

            <rect x="794" y="300" width="224" height="80" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
            <text x="906" y="328" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">🐋 Host Docker-daemon</text>
            <text x="906" y="350" text-anchor="middle" font-size="11" font-family="monospace" fill="#047857">/var/run/docker.sock</text>
            <text x="906" y="368" text-anchor="middle" font-size="11" fill="#047857">spawnt child-containers</text>

            <rect x="794" y="440" width="224" height="80" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
            <text x="906" y="468" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">👤 Operator-browser</text>
            <text x="906" y="490" text-anchor="middle" font-size="11" font-family="monospace" fill="#047857">http://localhost:3000</text>
            <text x="906" y="508" text-anchor="middle" font-size="11" fill="#047857">beheert firewall &amp; grants</text>

            <!-- ============ PIJLEN ============ -->
            <!-- devcontainer -> proxy -->
            <path d="M324,150 L408,145" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>
            <text x="368" y="120" text-anchor="middle" font-size="9.5" fill="#334155">alle uitgaande</text>
            <text x="368" y="132" text-anchor="middle" font-size="9.5" fill="#334155">HTTP/HTTPS</text>

            <!-- proxy -> internet -->
            <path d="M714,143 L788,141" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>
            <text x="754" y="120" text-anchor="middle" font-size="9.5" fill="#334155">allow →</text>
            <text x="754" y="132" text-anchor="middle" font-size="9.5" fill="#334155">forward</text>

            <!-- docker.sock -> socket-proxy -->
            <path d="M324,415 L408,379" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arr)"/>
            <text x="368" y="402" text-anchor="middle" font-size="9.5" fill="#334155">per-container</text>
            <text x="368" y="414" text-anchor="middle" font-size="9.5" fill="#334155">socket</text>

            <!-- socket-proxy -> host docker -->
            <path d="M714,379 L788,343" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrG)"/>
            <text x="754" y="396" text-anchor="middle" font-size="9.5" fill="#047857">grant +</text>
            <text x="754" y="408" text-anchor="middle" font-size="9.5" fill="#047857">label-policy</text>

            <!-- operator -> mgmt UI -->
            <path d="M788,478 L720,474" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrG)"/>
            <text x="754" y="500" text-anchor="middle" font-size="9.5" fill="#047857">:3000</text>
            <text x="754" y="512" text-anchor="middle" font-size="9.5" fill="#047857">host-only</text>
          </svg>
